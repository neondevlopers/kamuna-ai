<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamuna AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', 'Segoe UI', 'Monaco', monospace;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 50px);
            }
        }

        /* Glowing orb animation */
        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
            animation: orbFloat 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes orbFloat {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translate(50px, -50px) scale(1.1);
                opacity: 0.5;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header with typing animation */
        header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 2px solid #ffffff;
            margin-bottom: 30px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3em;
            letter-spacing: 4px;
            margin-bottom: 10px;
            animation: blink 3s step-end infinite;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        .glitch {
            font-size: 1.2em;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 100% {
                text-shadow: 2px 0 rgba(255,255,255,0.3);
            }
            25% {
                text-shadow: -2px 0 rgba(255,255,255,0.3);
            }
            50% {
                text-shadow: 2px 0 rgba(255,255,255,0.3);
            }
            75% {
                text-shadow: -2px 0 rgba(255,255,255,0.3);
            }
        }

        /* Chat container */
        .chat-container {
            background: rgba(0,0,0,0.8);
            border: 1px solid #ffffff;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            height: 500px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* Custom scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #ffffff;
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #cccccc;
        }

        /* Message animations */
        .message {
            margin-bottom: 20px;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message.user {
            text-align: right;
        }

        .message.user .message-content {
            background: #ffffff;
            color: #000000;
            display: inline-block;
            padding: 12px 20px;
            border-radius: 20px 20px 5px 20px;
            max-width: 70%;
            animation: pulse 0.5s ease-out;
        }

        .message.assistant .message-content {
            background: #1a1a1a;
            color: #ffffff;
            border: 1px solid #ffffff;
            display: inline-block;
            padding: 12px 20px;
            border-radius: 20px 20px 20px 5px;
            max-width: 70%;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .message-content {
            word-wrap: break-word;
            animation: fadeInUp 0.3s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Typing indicator */
        .typing-indicator {
            display: inline-block;
            padding: 12px 20px;
            background: #1a1a1a;
            border: 1px solid #ffffff;
            border-radius: 20px;
        }

        .typing-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ffffff;
            border-radius: 50%;
            margin: 0 2px;
            animation: typingDot 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingDot {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        /* Input area */
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #ffffff;
            background: rgba(0,0,0,0.9);
        }

        textarea {
            width: 100%;
            padding: 12px;
            background: #000000;
            color: #ffffff;
            border: 1px solid #ffffff;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
            transform: scale(1.01);
        }

        .chat-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            background: #000000;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #ffffff;
            color: #000000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .status-bar {
            background: #000000;
            border-top: 1px solid #ffffff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            margin-top: 20px;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff00;
            border-radius: 50%;
            animation: statusBlink 2s infinite;
            margin-right: 8px;
        }

        @keyframes statusBlink {
            0%, 100% {
                opacity: 1;
                background: #00ff00;
            }
            50% {
                opacity: 0.5;
                background: #ffffff;
            }
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-top-color: #000000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="orb" style="top: -100px; right: -100px;"></div>
    <div class="orb" style="bottom: -100px; left: -100px; animation-delay: -4s;"></div>

    <div class="container">
        <header>
            <h1> Kamuna V1</h1>
            <p class="glitch">> Models LLM | Kamuna V1</p>
        </header>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <div class="message-content">
                        > System initialized.<br>
                        > Kamuna AI Assistant ready.<br>
                        > How can I help you today?
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <textarea id="userInput" placeholder="> Type your message here..." rows="3"></textarea>
                <div class="chat-controls">
                    <button onclick="sendMessage()"> SEND </button>
                    <button onclick="clearChat()"> CLEAR </button>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="useTools" style="width: 18px; height: 18px; cursor: pointer;">
                        <span>> Enable Security Tools</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <div>
                <span class="status-dot"></span>
                <span id="status">CONNECTED</span>
            </div>
            <div>
                <span>> MODEL: Kamuna v1</span>
            </div>
            <div>
                <span id="timestamp"></span>
            </div>
        </div>
    </div>

    <script>
        // Update timestamp
        function updateTimestamp() {
            const now = new Date();
            const timestamp = now.toLocaleTimeString();
            document.getElementById('timestamp').innerHTML = `> ${timestamp}`;
        }
        updateTimestamp();
        setInterval(updateTimestamp, 1000);

        // Send message function
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            const useTools = document.getElementById('useTools').checked;
            
            if (!message) return;
            
            // Add user message to chat
            addMessage(message, 'user');
            input.value = '';
            
            // Show typing indicator
            showTypingIndicator();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        use_tools: useTools
                    })
                });
                
                const data = await response.json();
                
                // Remove typing indicator
                removeTypingIndicator();
                
                if (data.response) {
                    addMessage(data.response, 'assistant');
                } else if (data.error) {
                    addMessage(`Error: ${data.error}`, 'assistant');
                } else {
                    addMessage('Error: No response from server', 'assistant');
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage(`Connection Error: ${error.message}`, 'assistant');
            }
            
            // Scroll to bottom
            scrollToBottom();
        }
        
        function addMessage(text, sender) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            // Format text with line breaks
            const formattedText = text.replace(/\n/g, '<br>');
            
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${sender === 'assistant' ? '> ' : ''}${formattedText}
                </div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
        }
        
        function showTypingIndicator() {
            const messagesDiv = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>
            `;
            messagesDiv.appendChild(typingDiv);
            scrollToBottom();
        }
        
        function removeTypingIndicator() {
            const typingDiv = document.getElementById('typingIndicator');
            if (typingDiv) {
                typingDiv.remove();
            }
        }
        
        function clearChat() {
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML = `
                <div class="message assistant">
                    <div class="message-content">
                        > Chat cleared.<br>
                        > How can I help you today?
                    </div>
                </div>
            `;
        }
        
        function scrollToBottom() {
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Enter to send, Shift+Enter for new line
        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // Focus on input on load
        document.getElementById('userInput').focus();
        
        // Check server health
        async function checkHealth() {
            try {
                const response = await fetch('/api/health');
                if (response.ok) {
                    document.getElementById('status').innerHTML = 'CONNECTED';
                } else {
                    document.getElementById('status').innerHTML = 'DISCONNECTED';
                }
            } catch (error) {
                document.getElementById('status').innerHTML = 'OFFLINE';
            }
        }
        
        // Check health every 30 seconds
        setInterval(checkHealth, 30000);
    </script>
</body>
</html>
